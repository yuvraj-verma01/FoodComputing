# ============================================================
# Edible Oil Media Cloud Config - Sample-Derived Round 0
# ============================================================
#
# Phase 4 config only. Do not run Media Cloud until explicitly approved.
#
# Intended discovery command, after approval:
#   python -m crawler --config config/config_edible_oils_from_sample.yaml mc-discover --round 0

date_range:
  start: "2021-01-01"
  end: "2026-06-21"

# Terms used by relevance scoring and keyword-augmentation domain filters.
# Seed-query construction lives in config/edible_oil_seed_queries_from_sample.yaml.
food_terms:
  - edible oil
  - cooking oil
  - mustard oil
  - coconut oil
  - soybean oil
  - vegetable oil
  - groundnut oil
  - palm oil
  - olive oil
  - ghee and oil
  - adulterated ghee and oil

adulteration_terms:
  - adulterated
  - adulteration
  - food adulteration
  - adulterated food
  - adulterated food products
  - adulterated food items
  - adulterated foods
  - adulterated food business
  - substandard
  - fake

action_terms:
  - FSSAI
  - FSDA
  - food safety
  - food safety and standards
  - food safety department
  - food safety officer
  - food safety officers
  - food safety officials
  - food safety designated officers
  - commissioner of food safety
  - food safety commission
  - seized
  - seizure
  - raid
  - raids
  - raided
  - seizing
  - crackdown
  - major crackdown
  - ban
  - banned
  - oil manufacturing
  - oil manufacturing unit
  - samples

location_terms:
  - India
  - Indian
