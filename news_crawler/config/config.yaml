# ============================================================
# Food Oil Adulteration News Crawler — Main Configuration
# ============================================================

# --- Date Range (last 5 years; edit end to today's date) ---
date_range:
  start: "2021-06-01"
  end: "2026-06-17"

# --- Food / Oil Terms ---
food_terms:
  - edible oil
  - mustard oil
  - cooking oil
  - vegetable oil
  - palm oil
  - soybean oil
  - groundnut oil
  - sesame oil
  - sunflower oil
  - cottonseed oil
  - blended oil
  - rice bran oil
  - coconut oil
  - refined oil
  - crude palm oil
  - loose oil
  - sarson tel
  - vanaspati
  - rapeseed oil
  - linseed oil

# --- Adulteration / Incident Terms ---
adulteration_terms:
  - adulteration
  - adulterated
  - fake
  - spurious
  - substandard
  - misbranding
  - mislabelling
  - mislabeled
  - unsafe
  - sample failure
  - sample failed
  - contaminated
  - contamination
  - impure
  - impurity
  - fraud
  - fraudulent
  - diluted
  - dilution
  - mixed with
  - inferior quality
  - unhygienic

# --- Enforcement / Action Terms ---
action_terms:
  - FSSAI
  - food safety
  - food safety department
  - FDA
  - food authority
  - seized
  - seizure
  - raid
  - raided
  - arrested
  - arrest
  - fine
  - penalty
  - enforcement action
  - crackdown
  - inspection
  - tested
  - lab test
  - laboratory
  - complaint
  - license cancelled
  - notice issued
  - show cause
  - legal action
  - police
  - district administration

# --- Indian Location Terms ---
