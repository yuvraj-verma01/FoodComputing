# ============================================================
# Media Cloud Discovery + Iterative Keyword Augmentation
# ============================================================
#
# Setup:
#   1. Register at https://search.mediacloud.org/user/profile
#   2. Copy your API key to .env:  MEDIACLOUD_API_KEY=your_key
#   3. Find India collection IDs:
#        python -m crawler --config config/config_mediacloud.yaml mc-collections
#   4. Paste collection IDs into discovery.mediacloud.collection_ids below
#   5. Run:
#        python -m crawler --config config/config_mediacloud.yaml mc-augment
#
# Install required packages:
#   pip install mediacloud yake scikit-learn

date_range:
  start: "2021-01-01"
  end: "2026-06-18"

# ── Term lists (used by relevance scorer and keyword domain filter) ──────────
